name: Build-Docker-dev

on:
  push:
    branches-ignore:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: pasarguard/${{ github.event.repository.name }}
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build-dashboard:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./dashboard
        run: bun install --frozen-lockfile

      - name: Build dashboard
        run: ./build_dashboard.sh

      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: ./dashboard/build
          retention-days: 1

  build-images:
    needs: build-dashboard
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dashboard build
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: ./dashboard/build

      - name: Compute safe tag
        id: vars
        run: echo "tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' }}
          file: ./Dockerfile
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.tag }}-${{ matrix.arch }}
            ${{ env.GHCR_IMAGE }}:${{ steps.vars.outputs.tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.arch }}

  push-manifest:
    needs: build-images
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - name: Compute safe tag
        id: vars
        run: echo "tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tagged manifest (Docker Hub)
        uses: int128/docker-manifest-create-action@v2
        with:
          tags: ${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.tag }}
          sources: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.tag }}-amd64
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.tag }}-arm64

      - name: Create tagged manifest (GHCR)
        uses: int128/docker-manifest-create-action@v2
        with:
          tags: ${{ env.GHCR_IMAGE }}:${{ steps.vars.outputs.tag }}
          sources: |
            ${{ env.GHCR_IMAGE }}:${{ steps.vars.outputs.tag }}-amd64
            ${{ env.GHCR_IMAGE }}:${{ steps.vars.outputs.tag }}-arm64
