name: Test Database Migrations

on:
  push:
    paths:
      - "**.py"
      - ".github/workflows/test-database-migrations.yml"
  pull_request:
    paths:
      - "**.py"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/test-database-migrations.yml"

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set DATABASE_URL
        run: |
          echo "TEST_FROM=github" >> $GITHUB_ENV
          echo "TESTING=1" >> $GITHUB_ENV
          echo "SQLALCHEMY_DATABASE_URL=sqlite+aiosqlite:///./test.db" >> $GITHUB_ENV

      - name: Install test dependencies
        run: make setup-test

      - name: Run Alembic Migrations
        run: make run-migration
        env:
          PYTHON_GIL: 1

      - name: Check Migrations
        run: make check-migrations
        env:
          PYTHON_GIL: 1

      - name: Run Tests
        run: make test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set DATABASE_URL
        run: |
          echo "TEST_FROM=github" >> $GITHUB_ENV
          echo "TESTING=1" >> $GITHUB_ENV
          echo "SQLALCHEMY_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/testdb" >> $GITHUB_ENV

      - name: Install test dependencies
        run: make setup-test

      - name: Run Alembic Migrations
        run: make run-migration
        env:
          PYTHON_GIL: 1

      - name: Check Migrations
        run: make check-migrations
        env:
          PYTHON_GIL: 1

      - name: Run Tests
        run: make test

  test-timescaledb:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set DATABASE_URL
        run: |
          echo "TEST_FROM=github" >> $GITHUB_ENV
          echo "TESTING=1" >> $GITHUB_ENV
          echo "SQLALCHEMY_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/testdb" >> $GITHUB_ENV
          echo "NATS_ENABLED=1" >> $GITHUB_ENV
          echo "NATS_URL=nats://localhost:4222" >> $GITHUB_ENV
          echo "UVICORN_WORKERS=2" >> $GITHUB_ENV

      - name: Install test dependencies
        run: make setup-test

      - name: Wait for TimescaleDB
        run: |
          uv run python - <<'PY'
          import os
          import asyncio
          import asyncpg
          from sqlalchemy.engine import make_url

          url = make_url(os.environ["SQLALCHEMY_DATABASE_URL"])
          dsn = str(url.set(drivername="postgresql"))

          async def main():
              for _ in range(30):
                  try:
                      conn = await asyncpg.connect(dsn)
                      await conn.close()
                      print("TimescaleDB is ready.")
                      break
                  except Exception as exc:
                      print(f"Waiting for TimescaleDB: {exc}")
                      await asyncio.sleep(1)
              else:
                  raise SystemExit("TimescaleDB did not become ready in time.")

          asyncio.run(main())
          PY

      - name: Start NATS (JetStream)
        run: |
          docker run -d --name nats -p 4222:4222 nats:2.10-alpine -js
          for i in {1..20}; do
            nc -z 127.0.0.1 4222 && exit 0
            sleep 0.5
          done
          echo "NATS did not start in time" >&2
          exit 1

      - name: Run Alembic Migrations
        run: make run-migration
        env:
          PYTHON_GIL: 1

      - name: Check Migrations
        run: make check-migrations
        env:
          PYTHON_GIL: 1

      - name: Run Tests (multi-worker)
        run: |
          SCHEDULER_JOBSTORE_URL=sqlite:///./node-scheduler.db ROLE=node uv run python node_worker.py &
          SCHEDULER_JOBSTORE_URL=sqlite:///./scheduler.db ROLE=scheduler uv run python scheduler_worker.py &
          sleep 5
          make test

  test-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -hlocalhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set DATABASE_URL
        run: |
          echo "TEST_FROM=github" >> $GITHUB_ENV
          echo "TESTING=1" >> $GITHUB_ENV
          echo "SQLALCHEMY_DATABASE_URL=mysql+asyncmy://root:root@localhost:3306/testdb" >> $GITHUB_ENV

      - name: Install test dependencies
        run: make setup-test

      - name: Run Alembic Migrations
        run: make run-migration
        env:
          PYTHON_GIL: 1

      - name: Check Migrations
        run: make check-migrations
        env:
          PYTHON_GIL: 1

      - name: Run Tests
        run: make test

  test-mariadb:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_HOST: "%"
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: testdb
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpassword
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u testuser --password=testpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set DATABASE_URL
        run: |
          echo "TEST_FROM=github" >> $GITHUB_ENV
          echo "TESTING=1" >> $GITHUB_ENV
          echo "SQLALCHEMY_DATABASE_URL=mysql+asyncmy://testuser:testpassword@localhost:3307/testdb" >> $GITHUB_ENV
          echo "NATS_ENABLED=1" >> $GITHUB_ENV
          echo "NATS_URL=nats://localhost:4222" >> $GITHUB_ENV
          echo "UVICORN_WORKERS=2" >> $GITHUB_ENV

      - name: Install test dependencies
        run: make setup-test

      - name: Wait for MariaDB and ensure testuser grants
        run: |
          uv run python - <<'PY'
          import asyncio
          import asyncmy

          params = {
              "host": "127.0.0.1",
              "port": 3307,
              "user": "root",
              "password": "root",
              "database": "testdb",
              "autocommit": True,
          }

          async def main():
              for _ in range(60):
                  try:
                      conn = await asyncmy.connect(**params)
                      break
                  except Exception as exc:
                      print(f"Waiting for MariaDB as root: {exc}")
                      await asyncio.sleep(1)
              else:
                  raise SystemExit("MariaDB did not become ready in time.")

              async with conn.cursor() as cur:
                  await cur.execute("DROP USER IF EXISTS 'testuser'@'%'")
                  await cur.execute("DROP USER IF EXISTS 'testuser'@'localhost'")
                  await cur.execute("CREATE USER 'testuser'@'%' IDENTIFIED BY 'testpassword'")
                  await cur.execute("CREATE USER 'testuser'@'localhost' IDENTIFIED BY 'testpassword'")
                  await cur.execute("GRANT ALL PRIVILEGES ON *.* TO 'testuser'@'%'")
                  await cur.execute("GRANT ALL PRIVILEGES ON *.* TO 'testuser'@'localhost'")
                  await cur.execute("FLUSH PRIVILEGES")
                  await cur.execute("SELECT user, host, plugin FROM mysql.user WHERE user='testuser'")
                  print("Testuser entries:", await cur.fetchall())
              conn.close()

          asyncio.run(main())
          PY
      - name: Verify MariaDB connectivity as testuser
        run: |
          uv run python - <<'PY'
          import os
          import asyncio
          import asyncmy
          from sqlalchemy.engine import make_url

          url = make_url(os.environ["SQLALCHEMY_DATABASE_URL"])
          params = {
              "host": url.host or "127.0.0.1",
              "port": url.port or 3306,
              "user": url.username,
              "password": url.password,
              "database": url.database,
          }
          params_native = params | {"client_flag": asyncmy.constants.CLIENT.MULTI_STATEMENTS}

          async def main():
              print("Connecting with params:", params_native)
              try:
                  conn = await asyncmy.connect(**params_native)
              except Exception as exc:
                  print("FAILED to connect with params:", params_native)
                  raise
              async with conn.cursor() as cur:
                  await cur.execute("SELECT CURRENT_USER(), USER(), @@hostname")
                  print("User/host info:", await cur.fetchone())
                  await cur.execute("SHOW GRANTS")
                  print("Grants:", await cur.fetchall())
              conn.close()

          asyncio.run(main())
          PY
      - name: Start NATS (JetStream)
        run: |
          docker run -d --name nats -p 4222:4222 nats:2.10-alpine -js
          for i in {1..20}; do
            nc -z 127.0.0.1 4222 && exit 0
            sleep 0.5
          done
          echo "NATS did not start in time" >&2
          exit 1

      - name: Run Alembic Migrations
        run: make run-migration
        env:
          PYTHON_GIL: 1

      - name: Check Migrations
        run: make check-migrations
        env:
          PYTHON_GIL: 1

      - name: Run Tests (multi-worker)
        run: |
          SCHEDULER_JOBSTORE_URL=mysql+asyncmy://testuser:testpassword@localhost:3307/testdb ROLE=node uv run python node_worker.py &
          SCHEDULER_JOBSTORE_URL=mysql+asyncmy://testuser:testpassword@localhost:3307/testdb ROLE=scheduler uv run python scheduler_worker.py &
          sleep 5
          make test
